<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Player</title>
<script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.11.16/dist/clappr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@1.8.3/dist/hlsjs-playback.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/level-selector/dist/level-selector.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
#player { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="player"></div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (!id) { document.body.innerHTML = '<p style="color:red;padding:20px">id parametresi eksik</p>'; return; }

  // Stream URL
  var BASE = 'https://n0v.d72577a9dd0ec34.sbs/';
  var src = (id.indexOf('http') === 0) ? id : BASE + id + '/mono.m3u8';

  var plugins = [];
  if (typeof HlsjsPlayback !== 'undefined') plugins.push(HlsjsPlayback);
  if (typeof LevelSelector !== 'undefined') plugins.push(LevelSelector);

  var player = new Clappr.Player({
    source: src,
    parentId: '#player',
    width: '100%',
    height: '100%',
    autoPlay: true,
    mute: false,
    plugins: plugins,
    actualLiveTime: true,
    strings: {
      en: {
        live: 'CANLI',
        back_to_live: 'Canlıya Dön'
      }
    },
    levelSelectorConfig: {
      title: 'Kalite',
      labelCallback: function(d) {
        if (!d || d.id === -1) return 'AUTO';
        var h = d.height || (d.level && d.level.height);
        if (h) return h + 'p';
        return 'AUTO';
      }
    },
    playback: {
      playInline: true,
      crossOrigin: 'anonymous',
      hlsjsConfig: {
        enableWorker: true,
        // Düşük gecikme KAPALI — kalite öncelikli
        lowLatencyMode: false,
        // Geniş buffer — kalite düşürmesin
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        backBufferLength: 90,
        liveSyncDurationCount: 6,
        liveMaxLatencyDurationCount: 12,
        liveDurationInfinity: true,
        // En yüksek kaliteden başla
        startLevel: -1,
        autoLevelCapping: -1,
        capLevelToPlayerSize: false,
        abrEwmaDefaultEstimate: 10000000 // 10Mbps başlangıç tahmini → yüksek kalite seçtirir
      }
    }
  });

  // Manifest yüklenince en yüksek seviyeyi zorla
  player.on(Clappr.Events.PLAYER_PLAY, function() {
    try {
      var pb = player.core.getCurrentPlayback();
      if (pb && pb._hls) {
        var hls = pb._hls;
        hls.on(Hls.Events.MANIFEST_PARSED, function(e, data) {
          hls.currentLevel = data.levels.length - 1;
          console.log('[Player] En yüksek kalite:', data.levels[data.levels.length-1].height + 'p');
        });
        // Zaten yüklendiyse direkt set et
        if (hls.levels && hls.levels.length > 0) {
          hls.currentLevel = hls.levels.length - 1;
        }
      }
    } catch(e) { console.warn('[Player] level set hatası:', e); }
  });

})();
</script>
</body>
</html>
