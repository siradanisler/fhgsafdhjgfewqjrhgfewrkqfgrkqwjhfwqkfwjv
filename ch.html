<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Player</title>
<script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.11.16/dist/clappr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@1.8.3/dist/hlsjs-playback.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/level-selector/dist/level-selector.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
#player { width: 100%; height: 100%; }
#msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
       color: #fff; font-family: sans-serif; font-size: 18px; text-align: center; }
</style>
</head>
<body>
<div id="player"></div>
<div id="msg">Yükleniyor...</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (!id) {
    document.getElementById('msg').textContent = 'id parametresi eksik';
    return;
  }

  var BASE = 'https://n0v.d72577a9dd0ec34.sbs/';
  var src = (id.indexOf('http') === 0) ? id : BASE + id + '/mono.m3u8';

  function startPlayer() {
    document.getElementById('msg').style.display = 'none';

    var plugins = [];
    if (typeof HlsjsPlayback !== 'undefined') plugins.push(HlsjsPlayback);
    if (typeof LevelSelector !== 'undefined') plugins.push(LevelSelector);

    var player = new Clappr.Player({
      source: src,
      parentId: '#player',
      width: '100%',
      height: '100%',
      autoPlay: true,
      mute: false,
      plugins: plugins,
      actualLiveTime: true,
      strings: {
        en: {
          live: 'CANLI',
          back_to_live: 'Canlıya Dön',
          playback_not_supported: 'Yayın yüklenemedi.'
        }
      },
      levelSelectorConfig: {
        title: 'Kalite',
        labelCallback: function(d) {
          if (!d || d.id === -1) return 'AUTO';
          var h = d.height || (d.level && d.level.height);
          if (h) return h + 'p';
          return 'AUTO';
        }
      },
      playback: {
        playInline: true,
        hlsjsConfig: {
          enableWorker: true,
          lowLatencyMode: false,
          maxBufferLength: 60,
          maxMaxBufferLength: 120,
          backBufferLength: 90,
          liveSyncDurationCount: 6,
          liveMaxLatencyDurationCount: 12,
          liveDurationInfinity: true,
          startLevel: -1,
          autoLevelCapping: -1,
          capLevelToPlayerSize: false,
          abrEwmaDefaultEstimate: 10000000
        }
      }
    });

    // Manifest yüklenince en yüksek seviyeyi zorla
    player.on(Clappr.Events.PLAYER_PLAY, function() {
      try {
        var pb = player.core.getCurrentPlayback();
        if (pb && pb._hls) {
          var hls = pb._hls;
          hls.on(Hls.Events.MANIFEST_PARSED, function(e, data) {
            hls.currentLevel = data.levels.length - 1;
            console.log('[Player] Kalite:', data.levels[data.levels.length-1].height + 'p');
          });
          if (hls.levels && hls.levels.length > 0) {
            hls.currentLevel = hls.levels.length - 1;
          }
        }
      } catch(e) { console.warn('[Player] level set hatası:', e); }
    });
  }

  // Service Worker kaydet, sonra player'ı başlat
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/fhgsafdhjgfewqjrhgfewrkqfgrkqwjhfwqkfwjv/sw.js')
      .then(function(reg) {
        console.log('[SW] Kayıt başarılı:', reg.scope);
        if (reg.active) {
          startPlayer();
        } else {
          var sw = reg.installing || reg.waiting;
          sw.addEventListener('statechange', function() {
            if (sw.state === 'activated') startPlayer();
          });
        }
      })
      .catch(function(err) {
        console.warn('[SW] Kayıt başarısız, direkt başlatılıyor:', err);
        startPlayer();
      });
  } else {
    startPlayer();
  }
})();
</script>
</body>
</html>
