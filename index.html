<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TV</title>
<style>
  * { box-sizing: border-box; outline: none; user-select: none; -webkit-user-select: none; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000;
    font-family: sans-serif; overflow: hidden; color: #fff; }

  /* ── VIEWER ── */
  #viewer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; background: #000;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
  }

  /* Preview penceresi */
  #preview-wrap {
    position: relative; width: 68vw; height: 68vh;
    border: 2px solid rgba(14,203,129,0.2);
    border-radius: 8px; overflow: hidden; z-index: 2;
  }
  #preview-wrap::after {
    content: ''; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); z-index: -1;
    pointer-events: none;
  }
  #preview-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* Fullscreen */
  #viewer.fs #preview-wrap {
    width: 100vw; height: 100vh;
    border: none; border-radius: 0;
  }
  #viewer.fs #preview-wrap::after { display: none; }

  /* "OK · TAM EKRAN" ipucu */
  #fs-hint {
    position: absolute; bottom: -26px; left: 50%;
    -webkit-transform: translateX(-50%); transform: translateX(-50%);
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: rgba(255,255,255,0.25); text-transform: uppercase;
    white-space: nowrap; pointer-events: none;
  }
  #viewer.fs #fs-hint { display: none; }

  /* ── LOADER ── */
  #loader {
    position: fixed; top: 50%; left: 50%;
    width: 52px; height: 52px;
    border: 4px solid rgba(255,255,255,0.08);
    border-top: 4px solid #0ECB81;
    border-radius: 50%; display: none; z-index: 6;
    -webkit-transform: translate(-50%,-50%); transform: translate(-50%,-50%);
    -webkit-animation: spin 0.9s linear infinite; animation: spin 0.9s linear infinite;
    -webkit-animation-play-state: paused; animation-play-state: paused;
  }
  #loader.active { -webkit-animation-play-state: running; animation-play-state: running; }
  @-webkit-keyframes spin { to { -webkit-transform: translate(-50%,-50%) rotate(360deg); } }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── STATUS ── */
  #status {
    position: fixed; top: 40px; right: 40px;
    background: rgba(10,10,16,0.93);
    border: 1px solid rgba(14,203,129,0.3);
    padding: 10px 24px; border-radius: 40px;
    display: none; z-index: 200;
    font-size: 18px; font-weight: 700; color: #0ECB81;
  }

  /* ── HATA ── */
  #errBox {
    position: fixed; top: 50%; left: 50%;
    -webkit-transform: translate(-50%,-50%); transform: translate(-50%,-50%);
    background: rgba(10,10,16,0.97);
    border: 2px solid rgba(255,60,60,0.35);
    padding: 28px 36px; border-radius: 16px;
    display: none; z-index: 20; text-align: center; max-width: 80%;
  }
  #errBox strong { font-size: 16px; color: #ff6060; display: block; margin-bottom: 8px; }
  #errBox p { margin: 4px 0; font-size: 13px; color: #bbb; }

  /* ── KANAL MENÜSÜ ── */
  #kanalMenu {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
    display: -webkit-flex; display: flex;
    -webkit-align-items: flex-end; align-items: flex-end;
    padding: 0 54px 20px; gap: 18px;
    z-index: 10; overflow-x: hidden;
  }
  #kanalMenu::before {
    content: ''; position: fixed;
    bottom: 0; left: 0; right: 0; height: 280px;
    background: -webkit-linear-gradient(bottom, rgba(0,0,0,0.97), transparent);
    background: linear-gradient(to top, rgba(0,0,0,0.97), transparent);
    border-top: 2px solid #0ECB81;
    pointer-events: none; z-index: -1;
  }
  #viewer.fs ~ #kanalMenu { display: none; }

  /* ── KANAL KUTUSU ── */
  .kutu {
    -webkit-flex: 0 0 270px; flex: 0 0 270px; height: 128px;
    background: #131318; border-radius: 12px;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    text-align: center;
    border: 2px solid rgba(255,255,255,0.07);
    position: relative; padding: 10px;
    -webkit-transition: border-color 0.15s; transition: border-color 0.15s;
  }
  .kutu::after {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 4px; border-radius: 0 3px 3px 0; background: #333;
  }
  .cat-match::after   { background: #0ECB81; }
  .cat-channel::after { background: #3ced05; }

  .kutu.focused {
    -webkit-transform: scale(1.08) translateY(-6px);
    transform: scale(1.08) translateY(-6px);
    background: #fff; border-color: #0ECB81; z-index: 11;
  }
  .kutu.focused .ch-name { color: #000; }
  .kutu.focused .ch-sub  { color: #555; }
  .kutu.playing { border-color: #0ECB81; }
  .kutu.playing::before {
    content: "● İZLENİYOR"; position: absolute; top: 8px;
    font-size: 9px; font-weight: 900; color: #0ECB81; letter-spacing: 1px;
  }

  .ch-name {
    font-size: 19px; font-weight: 800; width: 92%;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ch-sub { font-size: 11px; margin-top: 6px; font-weight: 700; opacity: 0.7; }

  .live-dot { color: #ff3333; -webkit-animation: blink 1.5s linear infinite; animation: blink 1.5s linear infinite; }
  @-webkit-keyframes blink { 50% { opacity: 0.35; } }
  @keyframes blink { 50% { opacity: 0.35; } }

  .sep {
    -webkit-flex: 0 0 auto; flex: 0 0 auto;
    font-size: 10px; font-weight: 900; letter-spacing: 2px;
    color: rgba(255,255,255,0.2); text-transform: uppercase;
    -webkit-writing-mode: vertical-rl; writing-mode: vertical-rl;
    padding: 6px 0; white-space: nowrap;
    -webkit-align-self: center; align-self: center;
  }
</style>
</head>
<body>

<div id="viewer">
  <div id="preview-wrap">
    <div id="fs-hint">OK · TAM EKRAN</div>
  </div>
  <div id="loader"></div>
</div>
<div id="kanalMenu"></div>
<div id="status"></div>
<div id="errBox">
  <strong id="errTitle"></strong>
  <p id="errMsg"></p>
</div>

<script>
/* PATRON TV — Android TV | V1.3 */

var CONFIG = {
  MATCHES_API:     'https://patronsports2.cfd/matches.php',
  CHANNELS_API:    'https://patronsports2.cfd/channels.php',
  GAS_URL:         'https://script.google.com/macros/s/AKfycbyhS0ZfUiPE1qIZJDsq575TJCSaikwr_0uvYjJXw_6YaQiVjT3ftE8YMkNkMI_JxHpC/exec',
  FALLBACK_DOMAIN: 'https://patronizle14.cfd',
  REFRESH_MS:      5 * 60 * 1000
};

var ESPN_LEAGUES = {
  'UEFA Avrupa Ligi':    'uefa.europa',
  'UEFA Konferans Ligi': 'uefa.europa.conf',
  'Türkiye Süper Ligi':  'tur.super_lig',
  'euroleague':          'basketball/euroleague'
};

var CH_NAMES = {
  'patron':'BeIN Sports 1','yayinzirve':'BeIN Sports 1','yayinb2':'BeIN Sports 2',
  'yayinb3':'BeIN Sports 3','yayinb4':'BeIN Sports 4','yayinb5':'BeIN Sports 5',
  'yayinbm1':'BeIN Sports MAX 1','yayinbm2':'BeIN Sports MAX 2',
  'yayinss':'S Sport','yayinss2':'S Sport 2',
  'yayint1':'Tivibu Spor 1','yayint2':'Tivibu Spor 2',
  'yayint3':'Tivibu Spor 3','yayint4':'Tivibu Spor 4',
  'yayinsmarts':'Smart Spor','yayinsms2':'Smart Spor 2',
  'yayintrtspor':'TRT Spor','yayintrtspor2':'TRT Spor 2','yayintrt1':'TRT 1',
  'yayinas':'A Spor','yayinatv':'ATV','yayintv8':'TV 8','yayintv85':'TV 8.5',
  'yayinnbatv':'NBA TV','yayineu1':'Eurosport 1','yayineu2':'Eurosport 2',
  'yayinex1':'Tabii Spor 1','yayinex2':'Tabii Spor 2','yayinex3':'Tabii Spor 3',
  'yayinex4':'Tabii Spor 4','yayinex5':'Tabii Spor 5',
  'yayinex6':'Tabii Spor 6','yayinex7':'Tabii Spor 7'
};

var KEYS = {
  OK: [13, 23, 66],
  RIGHT: [39],
  LEFT: [37],
  CH_UP: [166, 33, 427],
  CH_DOWN: [167, 34, 428]
};

var state = { channels: [], current: -1, focused: 0, domain: null, retries: 0 };

var dom = {
  menu: document.getElementById('kanalMenu'),
  stat: document.getElementById('status'),
  load: document.getElementById('loader'),
  view: document.getElementById('viewer'),
  wrap:    document.getElementById('preview-wrap'),
  err:  document.getElementById('errBox'),
  errT: document.getElementById('errTitle'),
  errM: document.getElementById('errMsg')
};

/* ── YARDIMCI FONKSİYONLAR ── */
function isKey(keyCode, keyArray) {
  return keyArray.indexOf(keyCode) !== -1;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── LOADER & STATUS & HATA ── */
function showLoader(v) {
  dom.load.style.display = v ? 'block' : 'none';
  dom.load.className = v ? 'active' : '';
}

function showStatus(name) {
  dom.stat.textContent = name;
  dom.stat.style.display = 'block';
  clearTimeout(dom._st);
  dom._st = setTimeout(function() { dom.stat.style.display = 'none'; }, 3000);
}

function showError(title, msg) {
  dom.errT.textContent = title;
  dom.errM.textContent = msg;
  dom.err.style.display = 'block';
  setTimeout(function() { dom.err.style.display = 'none'; }, 5000);
}

/* ── FULLSCREEN ── */
function enterFullscreen() {
  dom.view.classList.add('fs');
  var ifr = dom.wrap.querySelector('iframe');
  if (!ifr) return;
  try {
    if (ifr.requestFullscreen) ifr.requestFullscreen();
    else if (ifr.webkitRequestFullscreen) ifr.webkitRequestFullscreen();
  } catch(e) { console.warn("Fullscreen error:", e); }
}

function exitFullscreen() {
  dom.view.classList.remove('fs');
  try {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  } catch(e) { console.warn("Exit fullscreen error:", e); }
}

document.addEventListener('fullscreenchange', handleFsChange);
document.addEventListener('webkitfullscreenchange', handleFsChange);

function handleFsChange() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    dom.view.classList.remove('fs');
  }
}

/* ── DOMAIN YÖNETİMİ ── */
function getCache() { try { return localStorage.getItem('ptv_domain') || null; } catch(e) { return null; } }
function setCache(d) { try { localStorage.setItem('ptv_domain', d); } catch(e) { console.warn(e); } }

function fetchDomainFromGAS(cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', CONFIG.GAS_URL + '?_=' + Date.now(), true);
  xhr.timeout = 20000;
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText).domain;
      if (d) { state.domain = d; setCache(d); cb(d); return; }
    } catch(e) { console.warn("Domain parse error:", e); }
    state.domain = CONFIG.FALLBACK_DOMAIN; cb(CONFIG.FALLBACK_DOMAIN);
  };
  xhr.onerror = xhr.ontimeout = function() {
    state.domain = CONFIG.FALLBACK_DOMAIN; cb(CONFIG.FALLBACK_DOMAIN);
  };
  xhr.send();
}

function detectActiveDomain(cb) {
  var cached = getCache();
  if (cached) {
    state.domain = cached;
    // Arka planda sessizce doğrula
    setTimeout(function() {
      fetchDomainFromGAS(function(d) {
        if (d !== cached) state.domain = d;
      });
    }, 200);
    cb(cached);
  } else {
    fetchDomainFromGAS(cb);
  }
}

/* ── VERİ ÇEKME ── */
function fetchData(cb) {
  var done = 0, matches = [], channels = [];
  function check() { if (++done === 2) cb(matches, channels); }

  function fetchXHR(url, targetArrName) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url + '?_=' + Date.now(), true);
    xhr.timeout = 10000;
    xhr.onload = function() {
      try {
        var d = JSON.parse(xhr.responseText);
        if (targetArrName === 'matches') matches = d.matches || d;
        else channels = Array.isArray(d) ? d : [];
      } catch(e) { console.warn("API parse error:", e); }
      check();
    };
    xhr.onerror = xhr.ontimeout = check;
    xhr.send();
  }

  fetchXHR(CONFIG.MATCHES_API, 'matches');
  fetchXHR(CONFIG.CHANNELS_API, 'channels');
}

/* ── ESPN CANLI DURUM KONTROLÜ ── */
function fetchFinishedTimes(espnKey, cb) {
  var sport = espnKey.indexOf('basketball') !== -1 ? 'basketball' : 'soccer';
  var league = espnKey.replace('basketball/', '');
  var url = 'https://site.api.espn.com/apis/site/v2/sports/' + sport + '/' + league + '/scoreboard';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 5000;
  xhr.onload = function() {
    var finished = {};
    try {
      var data = JSON.parse(xhr.responseText);
      var events = data.events || [];
      for (var i = 0; i < events.length; i++) {
        var ev = events[i];
        var status = ev.status && ev.status.type && ev.status.type.name;
        if (status === 'STATUS_FINAL') {
          var d = new Date(ev.date);
          d.setHours(d.getHours() + 3); // UTC → Türkiye
          var hh = ('0' + d.getHours()).slice(-2);
          var mm = ('0' + d.getMinutes()).slice(-2);
          finished[hh + ':' + mm] = true;
        }
      }
    } catch(e) { console.warn('ESPN parse error:', e); }
    cb(finished);
  };
  xhr.onerror = xhr.ontimeout = function() { cb({}); };
  xhr.send();
}

function filterFinishedMatches(list, cb) {
  var needed = {}, k, keys, done, key;
  for (var i = 0; i < list.length; i++) {
    if (list[i].espnKey) needed[list[i].espnKey] = null;
  }
  keys = Object.keys(needed);
  if (keys.length === 0) { cb(list); return; }
  done = 0;
  for (k = 0; k < keys.length; k++) {
    (function(key) {
      fetchFinishedTimes(key, function(finished) {
        needed[key] = finished;
        if (++done === keys.length) {
          var result = [];
          for (var j = 0; j < list.length; j++) {
            var item = list[j];
            if (item.espnKey && needed[item.espnKey] && needed[item.espnKey][item.time]) {
              console.warn('ESPN: bitti →', item.name, item.time);
              continue;
            }
            result.push(item);
          }
          cb(result);
        }
      });
    })(keys[k]);
  }
}

/* ── VERİ İŞLEME ── */
function buildUrl(url, domain) {
  if (!url) return '';
  if (url.indexOf('http') === 0 || url.indexOf('//') === 0) return url;
  return domain + (url.charAt(0) === '/' ? '' : '/') + url;
}

function isLive(timeStr, matchDate) {
  if (!timeStr) return false;
  try {
    var parts = timeStr.split(':');
    var h = parseInt(parts[0], 10), min = parseInt(parts[1], 10);
    // Türkiye saatini al (UTC+3)
    var nowTR = new Date(new Date().toLocaleString('en-US', {timeZone: 'Europe/Istanbul'}));
    var now = nowTR.getTime();
    var start;
    if (matchDate) {
      var dp = matchDate.split('.');
      var dt = new Date(parseInt(dp[2], 10), parseInt(dp[1], 10)-1, parseInt(dp[0], 10), h, min);
      start = dt.getTime();
    } else {
      // Bugün için dene
      var dt = new Date(nowTR);
      dt.setHours(h, min, 0, 0);
      start = dt.getTime();
      // Eğer start şimdiden 3 saatten fazla gerideyse dün olabilir,
      // ya da şimdiden 3 saatten fazla ilerideyse dün gece başlamış olabilir
      // Gece yarısı geçişi: şu an gece yarısından sonraysa (00:00-05:59) ve maç saati geç geceyse (20:00+)
      // o zaman dünün maçı sayılır
      var nowH = nowTR.getHours();
      if (nowH < 6 && h >= 20) {
        // Dün gece başlamış maç — dünün tarihini kullan
        var dtYesterday = new Date(nowTR);
        dtYesterday.setDate(dtYesterday.getDate() - 1);
        dtYesterday.setHours(h, min, 0, 0);
        start = dtYesterday.getTime();
      }
    }
    return now >= start && now <= start + 7200000; // +2 saat
  } catch(e) { return false; }
}

function processData(matches, channels, domain) {
  var list = [], i, item, src, m, chName, time, live;
  // Duplikasyon filtresi: her maç için sadece proxy kanal (id=http olan direct linkler atlanır)
  var seen = {};
  for (i = 0; i < matches.length; i++) {
    item = matches[i];
    if (!item.URL) continue;
    var idVal = (item.URL.split('?id=')[1] || '').split('&')[0];
    if (idVal.indexOf('http') === 0) continue; // direct link — atla
    var key = (item.HomeTeam || '') + '|' + (item.AwayTeam || '') + '|' + (item.Time || '');
    if (seen[key]) continue; // aynı maç zaten eklendi
    seen[key] = true;
    time = item.Time || item.time || '';
    live = isLive(time, item.date);
    if (!live) continue;
    src = buildUrl(item.URL, domain);
    if (!src) continue;
    m = item.URL.match(/[?&]id=([^&]+)/);
    chName = m ? (CH_NAMES[m[1]] || '') : '';
    var espnKey = null;
    if (item.league) {
      for (var ek in ESPN_LEAGUES) {
        if (item.league.toLowerCase().indexOf(ek.toLowerCase()) !== -1) {
          espnKey = ESPN_LEAGUES[ek]; break;
        }
      }
    }
    list.push({
      name: item.HomeTeam ? item.HomeTeam + ' - ' + item.AwayTeam : 'Maç',
      sub:  chName ? (time ? time + '  |  ' + chName : chName) : time,
      src: src, cat: 'match', live: true,
      league: item.league || '', espnKey: espnKey, time: time
    });
  }
  
  for (i = 0; i < channels.length; i++) {
    item = channels[i];
    if (!item.URL) continue;
    src = buildUrl(item.URL, domain);
    if (!src) continue;
    list.push({ name: item.Mac || 'Kanal', sub: '7/24 YAYIN', src: src, cat: 'channel', live: false });
  }
  return list;
}

/* ── RENDER & ARAYÜZ GÜNCELLEME ── */
function render() {
  var frag = document.createDocumentFragment();
  var prevCat = null, i, ch, div, sep, liveHtml;
  
  for (i = 0; i < state.channels.length; i++) {
    ch = state.channels[i];
    if (ch.cat !== prevCat && prevCat !== null) {
      sep = document.createElement('div');
      sep.className = 'sep';
      sep.textContent = ch.cat === 'channel' ? '7/24' : 'MAÇLAR';
      frag.appendChild(sep);
    }
    prevCat = ch.cat;
    div = document.createElement('div');
    div.className = 'kutu cat-' + ch.cat;
    liveHtml = ch.live ? '<span class="live-dot">\u25cf </span>CANLI  |  ' : '';
    div.innerHTML = '<div class="ch-name">' + esc(ch.name) + '</div><div class="ch-sub">' + liveHtml + esc(ch.sub) + '</div>';
    
    // ES5 Closure çözümü
    (function(idx) { div.onclick = function() { loadChannel(idx); }; })(i);
    frag.appendChild(div);
  }
  dom.menu.innerHTML = '';
  dom.menu.appendChild(frag);
}

function updateUI() {
  var boxes = dom.menu.querySelectorAll('.kutu');
  for (var i = 0; i < boxes.length; i++) {
    var node = boxes[i];
    var isFocused = (i === state.focused);
    var isPlaying = (i === state.current);
    
    if (node.classList.contains('focused') !== isFocused) node.classList.toggle('focused', isFocused);
    if (node.classList.contains('playing') !== isPlaying) node.classList.toggle('playing', isPlaying);
    
    if (isFocused) {
      // Eski TV'ler behavior: 'auto' desteklemeyebilir, çökmemesi için try-catch eklendi
      try {
        node.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' });
      } catch(e) {
        node.scrollIntoView(false); // Fallback
      }
    }
  }
}

/* ── KANAL YÜKLEME ── */
function loadChannel(i) {
  var ch = state.channels[i];
  if (!ch) return;
  
  state.current = i;
  state.focused = i;
  dom.err.style.display = 'none';

  var old = dom.wrap.querySelector('iframe');
  if (old) { old.src = 'about:blank'; old.parentNode.removeChild(old); }

  showLoader(true);
  showStatus(ch.name);

  var ifr = document.createElement('iframe');
  var sep = ch.src.indexOf('?') !== -1 ? '&' : '?';
  ifr.src = ch.src + sep + 'autoplay=1';
  ifr.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation allow-popups');
  ifr.setAttribute('allow', 'fullscreen; autoplay');
  ifr.setAttribute('allowfullscreen', 'true');
  ifr.setAttribute('referrerpolicy', 'no-referrer');
  ifr.setAttribute('tabindex', '-1');
  
  ifr.onload  = function() { showLoader(false); };
  ifr.onerror = function() { showLoader(false); showError('Yayın yüklenemedi', 'Kaynak yanıt vermiyor.'); };

  var hint = document.getElementById('fs-hint');
  dom.wrap.insertBefore(ifr, hint);
  updateUI();
}

/* ── TV KUMANDASI YÖNETİMİ ── */
document.addEventListener('keydown', function(e) {
  var k = e.keyCode;
  var isFs = dom.view.classList.contains('fs');

  if (isFs) {
    if (isKey(k, KEYS.OK)) exitFullscreen();
    return;
  }

  var len = state.channels.length;
  if (!len) return;

  if (isKey(k, KEYS.CH_UP)) { loadChannel((state.current + 1) % len); return; }
  if (isKey(k, KEYS.CH_DOWN)) { loadChannel((state.current - 1 + len) % len); return; }

  if      (isKey(k, KEYS.RIGHT)) { state.focused = (state.focused + 1) % len; updateUI(); }
  else if (isKey(k, KEYS.LEFT))  { state.focused = (state.focused - 1 + len) % len; updateUI(); }
  else if (isKey(k, KEYS.OK)) {
    if (state.focused === state.current) enterFullscreen();
    else loadChannel(state.focused);
  }
});

/* ── BAŞLATMA VE DÖNGÜ ── */
function init() {
  showLoader(true);
  detectActiveDomain(function(domain) {
    fetchData(function(matches, channels) {
      var processed = processData(matches, channels, domain);
      filterFinishedMatches(processed, function(filtered) {
        state.channels = filtered;
        if (!state.channels.length) {
          showLoader(false);
          showError('Liste boş', 'Hiç yayın bulunamadı.');
          setTimeout(init, 15000);
          return;
        }
        render();
        var startIdx = -1;
        for (var i = 0; i < state.channels.length; i++) {
          if (state.channels[i].src.indexOf('id=patron') !== -1) { startIdx = i; break; }
        }
        loadChannel(startIdx >= 0 ? startIdx : 0);
      });
    });
  });
}

// Uygulamayı Başlat
init();

// Arka Plan Veri Yenileme (Canlı Maç Takibi vs.)
setInterval(function() {
  if (!state.domain) return;
  fetchData(function(matches, channels) {
    var processed = processData(matches, channels, state.domain);
    filterFinishedMatches(processed, function(fresh) {
      if (!fresh.length) return;
      var prevSrc = state.current >= 0 ? state.channels[state.current].src : null;
      state.channels = fresh;
      render();
      if (prevSrc) {
        for (var i = 0; i < fresh.length; i++) {
          if (fresh[i].src === prevSrc) { state.current = i; state.focused = i; break; }
        }
      }
      updateUI();
    });
  });
}, CONFIG.REFRESH_MS);
</script>
