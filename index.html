<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TV</title>
<style>
  * { box-sizing: border-box; outline: none; user-select: none; -webkit-user-select: none; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000;
    font-family: sans-serif; overflow: hidden; color: #fff; }

  /* ── VIEWER ── */
  #viewer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; background: #000;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: row; flex-direction: row;
    -webkit-align-items: flex-start; align-items: flex-start;
    -webkit-justify-content: flex-start; justify-content: flex-start;
    padding: 4vh 3vw;
    box-sizing: border-box;
  }

  /* Preview penceresi */
  #preview-wrap {
    position: relative; width: 62vw; height: 70vh;
    border: 2px solid rgba(14,203,129,0.2);
    border-radius: 8px; overflow: hidden; z-index: 2;
    -webkit-flex-shrink: 0; flex-shrink: 0;
    /* GPU Hızlandırma */
    -webkit-transform: translateZ(0); transform: translateZ(0);
  }
  #preview-wrap::after {
    content: ''; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); z-index: -1;
    pointer-events: none;
  }
  #preview-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* Sağ bilgi paneli — ileride doldurulacak */
  #info-panel {
    -webkit-flex: 1; flex: 1;
    height: 70vh;
    margin-left: 2vw;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: flex-start; align-items: flex-start;
    -webkit-justify-content: flex-start; justify-content: flex-start;
    overflow: hidden;
    box-sizing: border-box;
    padding: 1vh 0;
  }


  /* Fullscreen */
  #viewer.fs #preview-wrap {
    width: 100vw; height: 100vh;
    border: none; border-radius: 0;
  }
  #viewer.fs #info-panel { display: none; }
  #viewer.fs #preview-wrap::after { display: none; }

  /* Tıklama engelleyici overlay — sadece iframe üzerinde, sadece fullscreen'de */
  #fs-overlay {
    display: none;
    position: absolute; inset: 0; z-index: 10;
    pointer-events: none;
  }
  #viewer.fs #fs-overlay {
    display: block;
    pointer-events: auto;
  }
  /* HLS player aktifken overlay'i gizle */
  #preview-wrap.hls-active #fs-overlay { display: none !important; }
  #preview-wrap.hls-active #fs-stripe  { display: none !important; }

  /* Üst şerit — preview'da ölçekli, fullscreen'de tam */
  #fs-stripe {
    position: absolute; top: 0; left: 0; right: 0;
    height: 52px; /* ← fullscreen yüksekliği, buradan ayarla */
    background: #000;
    z-index: 11;
    pointer-events: none;
    /* Preview modunda küçük görünüm: wrap 68vh yüksekliğinde,
       şerit oranını koru → 52/1080 * 68vh ≈ %3.27 */
    transform-origin: top left;
  }
  /* Preview modunda şeridi orantılı küçült */
  #viewer:not(.fs) #fs-stripe {
    height: calc(70vh * 52 / 1080);
  }

  /* WebView/tarayıcı fullscreen — wrap tam ekran olduğunda */
  #preview-wrap:fullscreen,
  #preview-wrap:-webkit-full-screen,
  #preview-wrap:-moz-full-screen {
    width: 100vw !important; height: 100vh !important;
    border: none !important; border-radius: 0 !important;
    background: #000;
  }
  #preview-wrap:fullscreen iframe,
  #preview-wrap:-webkit-full-screen iframe {
    width: 100% !important; height: 100% !important;
  }

  /* "OK · TAM EKRAN" ipucu */
  #fs-hint {
    position: absolute; bottom: -26px; left: 50%;
    -webkit-transform: translateX(-50%); transform: translateX(-50%);
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: rgba(255,255,255,0.25); text-transform: uppercase;
    white-space: nowrap; pointer-events: none;
  }
  #viewer.fs #fs-hint { display: none; }

  /* ── LOADER ── */
  #loader {
    position: fixed; top: 50%; left: 50%;
    width: 52px; height: 52px;
    border: 4px solid rgba(255,255,255,0.08);
    border-top: 4px solid #0ECB81;
    border-radius: 50%; display: none; z-index: 6;
    -webkit-transform: translate(-50%,-50%); transform: translate(-50%,-50%);
    -webkit-animation: spin 0.9s linear infinite; animation: spin 0.9s linear infinite;
    -webkit-animation-play-state: paused; animation-play-state: paused;
  }
  #loader.active { -webkit-animation-play-state: running; animation-play-state: running; }
  @-webkit-keyframes spin { to { -webkit-transform: translate(-50%,-50%) rotate(360deg); } }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* ── STATUS ── */
  #status {
    position: fixed; top: 40px; right: 40px;
    background: rgba(10,10,16,0.93);
    border: 1px solid rgba(14,203,129,0.3);
    padding: 10px 24px; border-radius: 40px;
    display: none; z-index: 200;
    font-size: 18px; font-weight: 700; color: #0ECB81;
  }

  /* ── HATA ── */
  #errBox {
    position: fixed; top: 50%; left: 50%;
    -webkit-transform: translate(-50%,-50%); transform: translate(-50%,-50%);
    background: rgba(10,10,16,0.97);
    border: 2px solid rgba(255,60,60,0.35);
    padding: 28px 36px; border-radius: 16px;
    display: none; z-index: 20; text-align: center; max-width: 80%;
  }
  #errBox strong { font-size: 16px; color: #ff6060; display: block; margin-bottom: 8px; }
  #errBox p { margin: 4px 0; font-size: 13px; color: #bbb; }

  /* ── KANAL MENÜSÜ ── */
  #kanalMenu {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
    display: -webkit-flex; display: flex;
    -webkit-align-items: flex-end; align-items: flex-end;
    padding: 0 54px 20px; gap: 18px;
    z-index: 10; overflow-x: hidden;
    scroll-behavior: smooth;
  }
  #kanalMenu::before {
    content: ''; position: fixed;
    bottom: 0; left: 0; right: 0; height: 280px;
    background: -webkit-linear-gradient(bottom, rgba(0,0,0,0.97), transparent);
    background: linear-gradient(to top, rgba(0,0,0,0.97), transparent);
    border-top: 2px solid #0ECB81;
    pointer-events: none; z-index: -1;
  }
  #viewer.fs ~ #kanalMenu { display: none; }

  /* ── KANAL KUTUSU ── */
  .kutu {
    -webkit-flex: 0 0 270px; flex: 0 0 270px; height: 128px;
    background: #131318; border-radius: 12px;
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: center; justify-content: center;
    text-align: center;
    border: 2px solid rgba(255,255,255,0.07);
    position: relative; padding: 10px;
    -webkit-transition: border-color 0.15s, -webkit-transform 0.15s; 
    transition: border-color 0.15s, transform 0.15s;
    /* GPU Hızlandırma - TV için kritik */
    -webkit-transform: translateZ(0); transform: translateZ(0);
    will-change: transform; cursor: pointer;
  }
  .kutu::after {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 4px; border-radius: 0 3px 3px 0; background: #333;
  }
  .cat-match::after   { background: #0ECB81; }
  .cat-channel::after { background: #3ced05; }

  .kutu.focused {
    -webkit-transform: scale(1.08) translateY(-6px) translateZ(0);
    transform: scale(1.08) translateY(-6px) translateZ(0);
    background: #fff; border-color: #0ECB81; z-index: 11;
  }
  .kutu.focused .ch-name { color: #000; }
  .kutu.focused .ch-sub  { color: #555; }
  .kutu.playing { border-color: #0ECB81; }
  .kutu.playing::before {
    content: "● İZLENİYOR"; position: absolute; top: 8px;
    font-size: 9px; font-weight: 900; color: #0ECB81; letter-spacing: 1px;
  }

  .ch-name {
    font-size: 19px; font-weight: 800; width: 92%;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ch-sub { font-size: 11px; margin-top: 6px; font-weight: 700; opacity: 0.7; pointer-events: none; }

  .live-dot { 
    color: #ff3333; 
    -webkit-animation: blink 1.5s linear infinite; 
    animation: blink 1.5s linear infinite; 
    will-change: opacity; /* Animasyon CPU kullanımını düşürür */
  }
  @-webkit-keyframes blink { 50% { opacity: 0.35; } }
  @keyframes blink { 50% { opacity: 0.35; } }

  .sep {
    -webkit-flex: 0 0 auto; flex: 0 0 auto;
    font-size: 10px; font-weight: 900; letter-spacing: 2px;
    color: rgba(255,255,255,0.2); text-transform: uppercase;
    -webkit-writing-mode: vertical-rl; writing-mode: vertical-rl;
    padding: 6px 0; white-space: nowrap;
    -webkit-align-self: center; align-self: center;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
</head>
<body>

<div id="viewer">
  <div id="preview-wrap">
    <video id="hls-player" style="display:none;width:100%;height:100%;background:#000;" playsinline autoplay></video>
    <iframe id="tv-player" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-popups" allow="fullscreen; autoplay" allowfullscreen="true" referrerpolicy="no-referrer" tabindex="-1"></iframe>
    <!-- Tıklama engelleyici overlay — fullscreen'de aktif -->
    <div id="fs-overlay"></div>
    <!-- Üst şerit — watermark/logo gizler -->
    <div id="fs-stripe"></div>
    <div id="fs-hint">OK · TAM EKRAN</div>
  </div>
  <!-- Sağ bilgi paneli — ileride doldurulacak -->
  <div id="info-panel"></div>
  <div id="loader"></div>
</div>
<div id="kanalMenu"></div>
<div id="status"></div>
<div id="errBox">
  <strong id="errTitle"></strong>
  <p id="errMsg"></p>
</div>

<script>
/* PATRON TV — Android TV | V1.7 - Optimize Edilmiş Sürüm */

var CONFIG = {
  MATCHES_API:     'https://patronsports2.cfd/matches.php',
  CHANNELS_API:    'https://patronsports2.cfd/channels.php',
  GAS_URL:         'https://script.google.com/macros/s/AKfycbyhS0ZfUiPE1qIZJDsq575TJCSaikwr_0uvYjJXw_6YaQiVjT3ftE8YMkNkMI_JxHpC/exec',
  FALLBACK_DOMAIN: 'https://patronizle16.cfd',
  REFRESH_MS:      5 * 60 * 1000,
  EXTRA_JSON:      'https://raw.githubusercontent.com/siradanisler/fhgsafdhjgfewqjrhgfewrkqfgrkqwjhfwqkfwjv/refs/heads/main/extra.json',
};

var CH_NAMES = {
  'patron':'BeIN Sports 1','yayinzirve':'BeIN Sports 1','yayinb2':'BeIN Sports 2',
  'yayinb3':'BeIN Sports 3','yayinb4':'BeIN Sports 4','yayinb5':'BeIN Sports 5',
  'yayinbm1':'BeIN Sports MAX 1','yayinbm2':'BeIN Sports MAX 2',
  'yayinss':'S Sport','yayinss2':'S Sport 2',
  'yayint1':'Tivibu Spor 1','yayint2':'Tivibu Spor 2',
  'yayint3':'Tivibu Spor 3','yayint4':'Tivibu Spor 4',
  'yayinsmarts':'Smart Spor','yayinsms2':'Smart Spor 2',
  'yayintrtspor':'TRT Spor','yayintrtspor2':'TRT Spor 2','yayintrt1':'TRT 1',
  'yayinas':'A Spor','yayinatv':'ATV','yayintv8':'TV 8','yayintv85':'TV 8.5',
  'yayinnbatv':'NBA TV','yayineu1':'Eurosport 1','yayineu2':'Eurosport 2',
  'yayinex1':'Tabii Spor 1','yayinex2':'Tabii Spor 2','yayinex3':'Tabii Spor 3',
  'yayinex4':'Tabii Spor 4','yayinex5':'Tabii Spor 5',
  'yayinex6':'Tabii Spor 6','yayinex7':'Tabii Spor 7'
};

var CH_M3U8 = {
  'trt1':          'https://tv-trt1.medya.trt.com.tr/master.m3u8',
  'trtspor':       'https://tv-trtspor1.medya.trt.com.tr/master.m3u8',
  'trtspor2':      'https://tv-trtspor2.medya.trt.com.tr/master.m3u8',
  'yayintrt1':     'https://tv-trt1.medya.trt.com.tr/master.m3u8',
  'yayintrtspor':  'https://tv-trtspor1.medya.trt.com.tr/master.m3u8',
  'yayintrtspor2': 'https://tv-trtspor2.medya.trt.com.tr/master.m3u8'
};

var KEYS = { OK: [13, 23, 66], RIGHT: [39], LEFT: [37], CH_UP: [166, 33, 427], CH_DOWN: [167, 34, 428], BACK: [27, 4] };

var state = { channels: [], current: -1, focused: 0, domain: null, retries: 0, hlsInstance: null };

var dom = {
  menu: document.getElementById('kanalMenu'),
  stat: document.getElementById('status'),
  load: document.getElementById('loader'),
  view: document.getElementById('viewer'),
  wrap: document.getElementById('preview-wrap'),
  err:  document.getElementById('errBox'),
  errT: document.getElementById('errTitle'),
  errM: document.getElementById('errMsg'),
  player: document.getElementById('tv-player'), // Sabit player referansı
  hlsVideo: document.getElementById('hls-player')
};

/* ── YARDIMCI FONKSİYONLAR ── */
function isKey(keyCode, keyArray) { return keyArray.indexOf(keyCode) !== -1; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── LOADER & STATUS & HATA ── */
function showLoader(v) {
  dom.load.style.display = v ? 'block' : 'none';
  dom.load.className = v ? 'active' : '';
}

function showStatus(name) {
  dom.stat.textContent = name;
  dom.stat.style.display = 'block';
  clearTimeout(dom._st);
  dom._st = setTimeout(function() { dom.stat.style.display = 'none'; }, 3000);
}

function showError(title, msg) {
  dom.errT.textContent = title;
  dom.errM.textContent = msg;
  dom.err.style.display = 'block';
  setTimeout(function() { dom.err.style.display = 'none'; }, 5000);
}

/* ── FULLSCREEN ── */
function enterFullscreen() {
  dom.view.classList.add('fs');
  try {
    var el = dom.wrap; // wrapper div — tuş olayları bizde kalır
    if      (el.requestFullscreen)       el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
    else if (el.msRequestFullscreen)     el.msRequestFullscreen();
  } catch(e) {}
}

function exitFullscreen() {
  dom.view.classList.remove('fs');
  try {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  } catch(e) {}
}

document.addEventListener('fullscreenchange', handleFsChange);
document.addEventListener('webkitfullscreenchange', handleFsChange);

function handleFsChange() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) dom.view.classList.remove('fs');
}

/* ── DOMAIN YÖNETİMİ ── */
function getCache() { try { return localStorage.getItem('ptv_domain') || null; } catch(e) { return null; } }
function setCache(d) { try { localStorage.setItem('ptv_domain', d); } catch(e) {} }

function fetchDomainFromGAS(cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', CONFIG.GAS_URL + '?_=' + Date.now(), true);
  xhr.timeout = 20000;
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText).domain;
      if (d) { state.domain = d; setCache(d); cb(d); return; }
    } catch(e) {}
    state.domain = CONFIG.FALLBACK_DOMAIN; cb(CONFIG.FALLBACK_DOMAIN);
  };
  xhr.onerror = xhr.ontimeout = function() { state.domain = CONFIG.FALLBACK_DOMAIN; cb(CONFIG.FALLBACK_DOMAIN); };
  xhr.send();
}

function detectActiveDomain(cb) {
  var cached = getCache();
  if (cached) {
    state.domain = cached;
    setTimeout(function() { fetchDomainFromGAS(function(d) { if (d !== cached) state.domain = d; }); }, 200);
    cb(cached);
  } else { fetchDomainFromGAS(cb); }
}

/* ── VERİ ÇEKME ── */
var cachedExtras = []; // fetch başarısız olsa bile son başarılı listeyi korur

function fetchData(cb) {
  var done = 0, matches = [], channels = [];
  function check() { if (++done === 3) cb(matches, channels, cachedExtras); }
  function fetchXHR(url, key) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url + '?_=' + Date.now(), true);
    xhr.timeout = 10000;
    xhr.onload = function() {
      try {
        var d = JSON.parse(xhr.responseText);
        if (key === 'matches') matches = d.matches || d;
        else if (key === 'channels') channels = Array.isArray(d) ? d : [];
        else if (key === 'extras') {
          var arr = Array.isArray(d) ? d : [];
          if (arr.length > 0) cachedExtras = arr;
        }
      } catch(e) {}
      check();
    };
    xhr.onerror = xhr.ontimeout = check;
    xhr.send();
  }
  fetchXHR(CONFIG.MATCHES_API, 'matches');
  fetchXHR(CONFIG.CHANNELS_API, 'channels');
  fetchXHR(CONFIG.EXTRA_JSON, 'extras');
}

/* ── ESPN ── */
function normTeam(s) {
  if (!s) return '';
  return s.toLowerCase().replace(/[\u0131\u0130]/g, 'i').replace(/[\u015f\u015e]/g, 's')
    .replace(/[\u00fc\u00dc]/g, 'u').replace(/[\u00f6\u00d6]/g, 'o')
    .replace(/[\u00e7\u00c7]/g, 'c').replace(/[\u011f\u011e]/g, 'g').replace(/[^a-z0-9]/g, '');
}
function teamsMatch(a, b) {
  if (!a || !b) return false;
  var na = normTeam(a), nb = normTeam(b);
  if (na.length < 3 || nb.length < 3) return false;
  return na.indexOf(nb) !== -1 || nb.indexOf(na) !== -1;
}

var espnPool = {}, espnPoolTime = 0;
function buildEspnPool(events) {
  var pool = {};
  for (var i = 0; i < events.length; i++) {
    var ev = events[i];
    if (!ev.competitions || !ev.competitions[0]) continue;
    var comp = ev.competitions[0], competitors = comp.competitors || [], home = null, away = null;
    for (var j = 0; j < competitors.length; j++) {
      if (competitors[j].homeAway === 'home') home = competitors[j]; else away = competitors[j];
    }
    if (!home || !away) continue;
    var statusName = ev.status && ev.status.type && ev.status.type.name || '';
    var isFinished = statusName === 'STATUS_FINAL';
    var isInProgress = statusName === 'STATUS_IN_PROGRESS' || statusName === 'STATUS_HALFTIME';
    var minute = isInProgress ? ((ev.status.displayClock) || (ev.status.type && ev.status.type.shortDetail) || '') : (isFinished ? 'MS' : '');
    var entry = {
      home: home.team && home.team.displayName || '', away: away.team && away.team.displayName || '',
      homeScore: homeScore = home.score || '0', awayScore: away.score || '0', minute: minute, finished: isFinished
    };
    pool[normTeam(entry.home) + '|' + normTeam(entry.away)] = entry;
  }
  return pool;
}

function fetchEspnPool(cb) {
  if (Date.now() - espnPoolTime < 28000 && espnPoolTime > 0) { cb(espnPool); return; }
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard', true);
  xhr.timeout = 7000;
  xhr.onload = function() {
    try { espnPool = buildEspnPool(JSON.parse(xhr.responseText).events || []); espnPoolTime = Date.now(); } catch(e) {}
    cb(espnPool);
  };
  xhr.onerror = xhr.ontimeout = function() { cb(espnPool); };
  xhr.send();
}

function findInPool(pool, homeTeam, awayTeam) {
  var nh = normTeam(homeTeam), na = normTeam(awayTeam), direct = pool[nh + '|' + na];
  if (direct) return direct;
  for (var key in pool) {
    if (teamsMatch(homeTeam, pool[key].home) && teamsMatch(awayTeam, pool[key].away)) return pool[key];
  }
  return null;
}

function filterFinishedMatches(list, cb) {
  var hasLive = false;
  for (var i = 0; i < list.length; i++) { if (list[i].live) { hasLive = true; break; } }
  if (!hasLive) { cb(list); return; }

  fetchEspnPool(function(pool) {
    var result = [];
    for (var j = 0; j < list.length; j++) {
      var item = list[j];
      if (!item.live) { result.push(item); continue; }
      var found = findInPool(pool, item.homeTeam, item.awayTeam);
      if (found && found.finished) continue;
      if (found && found.minute) {
        item.sub = found.minute + "'  " + found.homeScore + ' - ' + found.awayScore + (item.chName ? '  |  ' + item.chName : '');
      }
      result.push(item);
    }
    cb(result);
  });
}

/* ── VERİ İŞLEME ── */
function buildUrl(url, domain) {
  if (!url) return '';
  if (url.indexOf('http') === 0 || url.indexOf('//') === 0) return url;
  return domain + (url.charAt(0) === '/' ? '' : '/') + url;
}

function isLive(timeStr, matchDate) {
  if (!timeStr) return false;
  try {
    var parts = timeStr.split(':'), h = parseInt(parts[0], 10), min = parseInt(parts[1], 10);
    var nowTR = new Date(new Date().toLocaleString('en-US', {timeZone: 'Europe/Istanbul'}));
    var now = nowTR.getTime(), start;
    if (matchDate) {
      var dp = matchDate.split('.');
      start = new Date(parseInt(dp[2], 10), parseInt(dp[1], 10)-1, parseInt(dp[0], 10), h, min).getTime();
    } else {
      var dt = new Date(nowTR); dt.setHours(h, min, 0, 0); start = dt.getTime();
      if (nowTR.getHours() < 6 && h >= 20) {
        var dtYesterday = new Date(nowTR); dtYesterday.setDate(dtYesterday.getDate() - 1);
        dtYesterday.setHours(h, min, 0, 0); start = dtYesterday.getTime();
      }
    }
    return now >= start && now <= start + 7200000;
  } catch(e) { return false; }
}

function processData(matches, channels, extras, domain) {
  var list = [], seen = {};
  for (var i = 0; i < matches.length; i++) {
    var item = matches[i];
    if (!item.URL) continue;
    var idVal = (item.URL.split('?id=')[1] || '').split('&')[0];
    if (idVal.indexOf('http') === 0) continue;
    var key = (item.HomeTeam || '') + '|' + (item.AwayTeam || '') + '|' + (item.Time || '');
    if (seen[key]) continue; seen[key] = true;
    var time = item.Time || item.time || '', live = isLive(time, item.date);
    if (!live) continue;
    var src = buildUrl(item.URL, domain);
    if (!src) continue;
    var m = item.URL.match(/[?&]id=([^&]+)/);
    var chId = m ? m[1] : '';
    var chName = CH_NAMES[chId] || '';
    // Resmi m3u8 kaynağı varsa Patron iframe'i yerine onu kullan
    var officialM3u8 = CH_M3U8[chId];
    list.push({
      name: item.HomeTeam ? item.HomeTeam + ' - ' + item.AwayTeam : 'Maç',
      sub:  chName ? (time ? time + '  |  ' + chName : chName) : time,
      src: officialM3u8 || src,
      type: officialM3u8 ? 'm3u8' : 'iframe',
      cat: 'match', live: true,
      homeTeam: item.HomeTeam || '', awayTeam: item.AwayTeam || '',
      chName: chName, time: time
    });
  }
  for (var j = 0; j < channels.length; j++) {
    var cItem = channels[j];
    if (!cItem.URL) continue;
    // CH_M3U8'de resmi kaynağı olan kanalları Patron listesinden atla (extra.json'dan gelecek)
    var cId = (cItem.URL.match(/[?&]id=([^&]+)/) || [])[1] || '';
    if (CH_M3U8[cId]) continue;
    var cSrc = buildUrl(cItem.URL, domain);
    if (!cSrc) continue;
    list.push({ name: cItem.Mac || 'Kanal', sub: '7/24 YAYIN', src: cSrc, cat: 'channel', live: false, type: 'iframe' });
  }
  for (var k = 0; k < extras.length; k++) {
    var ex = extras[k];
    if (!ex.name) continue;
    if (!ex.src) continue;
    var entry = {
      name: ex.name,
      sub: ex.sub || '7/24 YAYIN',
      src: ex.src,
      cat: 'channel',
      live: false,
      type: ex.type || 'iframe'  // 'm3u8' veya 'iframe'
    };
    list.push(entry);
  }
  return list;
}

/* ── OPTİMİZE EDİLMİŞ RENDER (String Builder) ── */
function render() {
  var html = '', prevCat = null;
  for (var i = 0; i < state.channels.length; i++) {
    var ch = state.channels[i];
    if (ch.cat !== prevCat && prevCat !== null) {
      html += '<div class="sep">' + (ch.cat === 'channel' ? '7/24' : 'MAÇLAR') + '</div>';
    }
    prevCat = ch.cat;
    var liveHtml = ch.live ? '<span class="live-dot">\u25cf </span>CANLI  |  ' : '';
    
    // data-idx attribute'u event delegation için eklendi
    html += '<div class="kutu cat-' + ch.cat + '" data-idx="' + i + '">' +
            '<div class="ch-name">' + esc(ch.name) + '</div>' +
            '<div class="ch-sub">' + liveHtml + esc(ch.sub) + '</div>' +
            '</div>';
  }
  // Tek seferde DOM'a yazılır (Performans artışı)
  dom.menu.innerHTML = html;
}

function updateUI() {
  var boxes = dom.menu.querySelectorAll('.kutu');
  for (var i = 0; i < boxes.length; i++) {
    var node = boxes[i];
    var dataIdx = parseInt(node.getAttribute('data-idx'), 10);
    var isFocused = (dataIdx === state.focused);
    var isPlaying = (dataIdx === state.current);
    
    if (node.classList.contains('focused') !== isFocused) node.classList.toggle('focused', isFocused);
    if (node.classList.contains('playing') !== isPlaying) node.classList.toggle('playing', isPlaying);
    
    if (isFocused) {
      try { node.scrollIntoView({ behavior: 'auto', inline: 'center', block: 'nearest' }); } 
      catch(e) { node.scrollIntoView(false); }
    }
  }
}

/* ── OPTİMİZE EDİLMİŞ KANAL YÜKLEME (iFrame Reuse) ── */
var loadSeq = 0; // her loadChannel çağrısında artar — eski callback'leri iptal eder

function loadChannel(i) {
  var ch = state.channels[i];
  if (!ch) return;

  var mySeq = ++loadSeq;

  state.current = i;
  state.focused = i;
  dom.err.style.display = 'none';

  showLoader(true);
  showStatus(ch.name);

  // Önceki HLS instance'ı senkron olarak temizle
  if (state.hlsInstance) {
    try { state.hlsInstance.destroy(); } catch(e) {}
    state.hlsInstance = null;
  }

  if (ch.type === 'm3u8') {
    dom.player.src = 'about:blank';
    dom.player.style.display = 'none';
    dom.hlsVideo.style.display = 'block';
    dom.wrap.classList.add('hls-active'); /* overlay'i kapat */
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      var hls = new Hls({ enableWorker: false, manifestLoadingTimeOut: 10000, levelLoadingTimeOut: 10000 });
      state.hlsInstance = hls;
      hls.loadSource(ch.src);
      hls.attachMedia(dom.hlsVideo);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        if (loadSeq !== mySeq) return;
        dom.hlsVideo.play().catch(function(){});
        showLoader(false);
      });
      hls.on(Hls.Events.ERROR, function(e, data) {
        if (loadSeq !== mySeq) return;
        if (data.fatal) { showLoader(false); showError('Yayın yüklenemedi', 'HLS hatası: ' + (data.type || '')); }
      });
    } else if (dom.hlsVideo.canPlayType('application/vnd.apple.mpegurl')) {
      dom.hlsVideo.src = ch.src;
      dom.hlsVideo.onloadedmetadata = function() {
        if (loadSeq !== mySeq) return;
        dom.hlsVideo.play().catch(function(){});
        showLoader(false);
      };
      dom.hlsVideo.onerror = function() {
        if (loadSeq !== mySeq) return;
        showLoader(false); showError('Yayın yüklenemedi', 'Native HLS hatası.');
      };
    } else {
      showLoader(false);
      showError('Desteklenmiyor', 'Bu cihaz HLS oynatamıyor.');
    }
  } else {
    dom.hlsVideo.pause();
    dom.hlsVideo.removeAttribute('src');
    dom.hlsVideo.load();
    dom.hlsVideo.style.display = 'none';
    dom.wrap.classList.remove('hls-active'); /* overlay'i aç */
    dom.player.style.display = 'block';
    dom.player.onload  = function() { if (loadSeq === mySeq) showLoader(false); };
    dom.player.onerror = function() { if (loadSeq === mySeq) { showLoader(false); showError('Yayın yüklenemedi', 'Kaynak yanıt vermiyor.'); } };
    var sep = ch.src.indexOf('?') !== -1 ? '&' : '?';
    dom.player.src = 'about:blank';
    setTimeout(function() {
      if (loadSeq !== mySeq) return;
      dom.player.src = ch.src + sep + 'autoplay=1';
    }, 20);
  }

  updateUI();
}

/* ── EVENT DELEGATION (Tıklamalar için) ── */
// Tek tek div'lere onclick atamak yerine menü genelinde tek bir dinleyici
dom.menu.addEventListener('click', function(e) {
  var kutu = e.target.closest ? e.target.closest('.kutu') : null;
  // Eski TV tarayıcıları için .closest fallback'i
  if (!kutu) {
    var el = e.target;
    while (el && el !== dom.menu) {
      if (el.classList && el.classList.contains('kutu')) { kutu = el; break; }
      el = el.parentNode;
    }
  }
  if (kutu) {
    var idx = parseInt(kutu.getAttribute('data-idx'), 10);
    if (!isNaN(idx)) loadChannel(idx);
  }
});

/* ── TV KUMANDASI YÖNETİMİ ── */
document.addEventListener('keydown', function(e) {
  var k = e.keyCode;
  var isFs = dom.view.classList.contains('fs');

  if (isFs) {
    // Fullscreen modundayken:
    // OK veya herhangi yön tuşu → fullscreen'den çık, menüyü aç
    // BACK → fullscreen'den çık (menü açmadan)
    if (isKey(k, KEYS.BACK)) { exitFullscreen(); return; }
    if (isKey(k, KEYS.OK) || isKey(k, KEYS.RIGHT) || isKey(k, KEYS.LEFT)) {
      exitFullscreen();
      return;
    }
    if (isKey(k, KEYS.CH_UP) || isKey(k, KEYS.CH_DOWN)) {
      // CH tuşları fullscreen'deyken de kanal değiştirir
      var len2 = state.channels.length;
      if (isKey(k, KEYS.CH_UP))   loadChannel((state.current + 1) % len2);
      else                         loadChannel((state.current - 1 + len2) % len2);
      return;
    }
    return;
  }

  var len = state.channels.length;
  if (!len) return;

  if (isKey(k, KEYS.CH_UP)) { loadChannel((state.current + 1) % len); return; }
  if (isKey(k, KEYS.CH_DOWN)) { loadChannel((state.current - 1 + len) % len); return; }

  if      (isKey(k, KEYS.RIGHT)) { state.focused = (state.focused + 1) % len; updateUI(); }
  else if (isKey(k, KEYS.LEFT))  { state.focused = (state.focused - 1 + len) % len; updateUI(); }
  else if (isKey(k, KEYS.OK)) {
    if (state.focused === state.current) enterFullscreen();
    else loadChannel(state.focused);
  }
});



/* ── BAŞLATMA VE DÖNGÜ ── */
function init() {
  showLoader(true);
  detectActiveDomain(function(domain) {
    fetchData(function(matches, channels, extras) {
      var processed = processData(matches, channels, extras, domain);
      filterFinishedMatches(processed, function(filtered) {
        state.channels = filtered;
        if (!state.channels.length) {
          showLoader(false); showError('Liste boş', 'Hiç yayın bulunamadı.');
          setTimeout(init, 15000); return;
        }
        render(); updateUI();
        var startIdx = -1;
        for (var i = 0; i < state.channels.length; i++) {
          if (state.channels[i].src.indexOf('id=patron') !== -1) { startIdx = i; break; }
        }
        loadChannel(startIdx >= 0 ? startIdx : 0);
      });
    });
  });
}

init();

setInterval(function() {
  if (!state.domain) return;
  fetchData(function(matches, channels, extras) {
    var processed = processData(matches, channels, extras, state.domain);
    filterFinishedMatches(processed, function(fresh) {
      if (!fresh.length) return;
      var prevSrc = state.current >= 0 ? state.channels[state.current].src : null;
      state.channels = fresh;
      render();
      if (prevSrc) {
        for (var i = 0; i < fresh.length; i++) {
          if (fresh[i].src === prevSrc) { state.current = i; state.focused = i; break; }
        }
      }
      updateUI();
    });
  });
}, CONFIG.REFRESH_MS);

setInterval(function() {
  var hasLive = false;
  for (var i = 0; i < state.channels.length; i++) { if (state.channels[i].live) { hasLive = true; break; } }
  if (!hasLive) return;
  espnPoolTime = 0; 
  fetchEspnPool(function(pool) {
    var changed = false;
    for (var j = 0; j < state.channels.length; j++) {
      var ch = state.channels[j];
      if (!ch.live) continue;
      var found = findInPool(pool, ch.homeTeam, ch.awayTeam);
      if (found && found.finished) {
        state.channels.splice(j, 1);
        if (state.current > j) state.current--;
        if (state.focused > j) state.focused--;
        j--; changed = true; continue;
      }
      var newSub = ch.time + (ch.chName ? '  |  ' + ch.chName : '');
      if (found && found.minute) newSub = found.minute + "'  " + found.homeScore + ' - ' + found.awayScore + (ch.chName ? '  |  ' + ch.chName : '');
      if (newSub !== ch.sub) { ch.sub = newSub; changed = true; }
    }
    if (changed) { render(); updateUI(); }
  });
}, 30000);
</script>
